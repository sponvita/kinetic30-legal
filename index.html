<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans JP"', 'sans-serif'],
          },
          colors: {
            navy: '#0f172a',
            accent: '#2563eb',
          },
        },
      },
    }

<body class="font-sans text-navy bg-slate-50 antialiased">
  <header class="fixed top-0 left-0 right-0 z-50 bg-slate-50/70 backdrop-blur-md border-b border-slate-200/60">
    <div class="px-6 sm:px-8 h-16 flex items-center">
      <div class="max-w-4xl mx-auto w-full">
        <a href="https://sponvita.co.jp/" class="flex items-center gap-0">
          <img src="icon.svg" alt="" width="38" height="34" class="h-9 w-auto flex-shrink-0">
          <span class="text-lg font-semibold tracking-tighter text-navy">SPONVITA</span>
        </a>
      </div>
    </div>
  </header>

  <main class="pt-16">
    <!-- Page Header -->
    <section class="pt-16 sm:pt-20 pb-8 px-6 sm:px-8">
      <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl sm:text-5xl font-black tracking-tighter text-navy mb-6">Apps</h1>
      </div>
    </section>

    <!-- App List -->
    <section class="pb-32 px-6 sm:px-8">
      <div class="max-w-4xl mx-auto space-y-10">

        <!-- WordDrop -->
        <a href="word-drop/" class="block border border-slate-200 rounded-2xl bg-white overflow-hidden hover:border-accent/40 hover:shadow-md transition-all">
          <div class="p-8 sm:p-10">
            <div class="flex items-start gap-6 sm:gap-8">

              </div>
              <!-- App info -->
              <div class="flex-1 min-w-0">
                <div class="flex flex-wrap items-center gap-2 mb-2">
                  <h2 class="text-xl sm:text-2xl font-bold tracking-tight text-navy">WordDrop</h2>
                </div>
                <p class="text-xs text-slate-400 tracking-wider uppercase mb-4">iOS / Android</p>
                <p class="text-slate-600 text-sm leading-relaxed">
                  心に残った言葉を、いつでも手元に。<br>
                  読書中に出会った名言や心に響いたフレーズを記録し、ホーム画面ウィジェットでふとした瞬間に振り返れるアプリです。
                </p>
              </div>
            </div>
          </div>
        </a>

      </div>
    </section>
  </main>

  <footer class="py-12 px-6 sm:px-8 border-t border-slate-100">
    <div class="max-w-4xl mx-auto text-center">
      <p class="text-sm text-slate-500">&copy; 2026 SPONVITA Inc.</p>
    </div>
  </footer>

</html>
